name: Retrain Model

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retraining even if no drift detected"
        required: false
        default: "false"

jobs:
  check-drift:
    runs-on: ubuntu-latest
    
    outputs:
      drift_detected: ${{ steps.drift-check.outputs.drift_detected }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for drift
        id: drift-check
        run: |
          python monitoring/check_drift.py
          # Output will be used to conditionally trigger retraining

  retrain:
    runs-on: ubuntu-latest
    needs: check-drift
    if: needs.check-drift.outputs.drift_detected == 'true' || github.event.inputs.force_retrain == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run full pipeline
        run: |
          python src/data/ingestion.py
          python src/data/preprocessing.py
          python src/models/train.py
      
      - name: Evaluate new model
        run: |
          python src/evaluation/evaluate.py
      
      - name: Register model
        run: |
          python src/models/registry.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            reports/
            metrics.json
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update model artifacts"
          branch: auto-model-update
          title: "Auto-update model"
          body: "Automated model retraining completed. Please review before merging."
