name: CD - Deploy Model

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version to deploy"
        required: false
        default: "latest"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run evaluation
        run: |
          python src/evaluation/evaluate.py
      
      - name: Check thresholds
        run: |
          python -c "
          import json
          with open('reports/evaluation_report.json') as f:
              report = json.load(f)
          assert report.get('deployment_ready', False), 'Model did not meet thresholds'
          print('✓ Model passed all thresholds')
          "

  deploy:
    runs-on: ubuntu-latest
    needs: evaluate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}/churn-api
          VERSION=${{ github.sha }}
          
          docker build -t $IMAGE_NAME:$VERSION .
          docker push $IMAGE_NAME:$VERSION
          
          # Tag as latest for main branch
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest
            docker push $IMAGE_NAME:latest
          fi
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here (kubectl, docker-compose, etc.)
      
      - name: Notify deployment
        run: |
          echo "✓ Deployment complete"
          echo "Image: ghcr.io/${{ github.repository }}/churn-api:${{ github.sha }}"
