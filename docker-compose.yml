services:
  # PostgreSQL for MLflow tracking
  postgres:
    image: postgres:15-alpine
    container_name: mlops_postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops_password
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow Tracking Server
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlops_mlflow
    environment:
      MLFLOW_TRACKING_URI: postgresql://mlops:mlops_password@postgres:5432/mlflow
      MLFLOW_S3_URI: ./mlruns
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://mlops:mlops_password@postgres:5432/mlflow

  # Model Serving API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data/processed:/app/data/processed
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000

  # Monitoring (Evidently)
  monitoring:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    container_name: mlops_monitoring
    ports:
      - "8001:8000"
    volumes:
      - ./monitoring:/app/monitoring
      - ./data:/app/data

volumes:
  postgres_data:
